<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body { margin:0; font-family: Arial; }
</style>
</head>

<body class="bg-black text-white">
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, signInAnonymously, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const e = React.createElement;

function App() {
  const [user, setUser] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [text, setText] = React.useState("");
  const [loading, setLoading] = React.useState(true);

  // 🔥 AUTH FIX (مهم جداً)
  React.useEffect(() => {
    const login = async () => {
      try {
        await signInAnonymously(auth);
      } catch (err) {
        console.error("Auth Error:", err);
      }
    };
    login();

    const unsub = onAuthStateChanged(auth, (u) => {
      setUser(u);
      setLoading(false);
    });

    return () => unsub();
  }, []);

  // 🔥 FIRESTORE LISTENER FIX
  React.useEffect(() => {
    if (!user) return;

    const ref = collection(db, "chats");

    const unsub = onSnapshot(ref, (snap) => {
      const data = snap.docs.map(d => d.data());

      data.sort((a, b) => {
        return (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0);
      });

      setMessages(data);
    }, (err) => {
      console.error("Firestore Error:", err);
    });

    return () => unsub();
  }, [user]);

  // 🔥 SEND MESSAGE
  const send = async () => {
    if (!text.trim()) return;

    try {
      await addDoc(collection(db, "chats"), {
        text,
        role: "user",
        timestamp: serverTimestamp()
      });

      setText("");
    } catch (err) {
      console.error("Send Error:", err);
    }
  };

  // 🔥 LOADING STATE FIX
  if (loading) {
    return e("div", {
      className:"h-screen flex items-center justify-center"
    }, "جاري تسجيل الدخول...");
  }

  return e("div", {className:"h-screen flex flex-col"},

    // CHAT AREA
    e("div", {className:"flex-1 overflow-y-auto p-4 space-y-2"},
      messages.map((m, i) =>
        e("div", {
          key:i,
          className:"bg-gray-800 p-3 rounded"
        }, m.text)
      )
    ),

    // INPUT
    e("div", {className:"p-3 flex gap-2 bg-gray-900"},
      e("input", {
        value:text,
        onChange:(e)=>setText(e.target.value),
        className:"flex-1 p-2 bg-black rounded",
        placeholder:"اكتب رسالة..."
      }),
      e("button", {
        onClick:send,
        className:"bg-cyan-600 px-4 rounded"
      }, "إرسال")
    )
  );
}

ReactDOM.render(
  e(App),
  document.getElementById("root")
);
</script>

</body>
</html>
