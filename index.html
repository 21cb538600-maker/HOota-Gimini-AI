<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOota Ai | النواة الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #020617; color: #e2e8f0; overflow: hidden; height: 100vh; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .ai-msg { background: rgba(30, 41, 59, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px 20px 0 20px; }
        .user-msg { background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); color: #000; font-weight: 600; border-radius: 20px 20px 20px 0; }
        .typing-dot { width: 5px; height: 5px; background: #06b6d4; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        pre { background: #0f172a; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; font-family: monospace; direction: ltr; margin: 0.5rem 0; border: 1px solid rgba(255,255,255,0.1); }
        code { color: #22d3ee; }
    </style>
</head>
<body class="flex h-screen">

    <!-- Sidebar -->
    <aside class="hidden lg:flex w-72 flex-col glass-panel p-6 gap-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                <i data-lucide="brain-circuit" class="text-black"></i>
            </div>
            <h1 class="text-xl font-black italic tracking-tighter uppercase text-white">HOota <span class="text-cyan-400">Ai</span></h1>
        </div>
        <div class="flex-1 space-y-4">
            <button onclick="window.location.reload()" class="w-full flex items-center gap-3 p-3 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all text-sm">
                <i data-lucide="plus" size="18"></i> محادثة جديدة
            </button>
            <div id="history" class="space-y-2">
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest px-2">جلسة العمل الحالية</p>
                <div class="p-3 text-xs text-cyan-400 bg-cyan-500/5 rounded-lg border border-cyan-500/10 truncate">متصل بـ Gemini Engine</div>
            </div>
        </div>
        <div class="p-4 bg-cyan-500/10 rounded-2xl border border-cyan-500/20 text-[10px]">
            <p class="font-bold text-cyan-400 uppercase mb-1 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span> الحالة: نشط
            </p>
            <p class="text-slate-400">نظام البحث المتقدم يعمل بكامل طاقته</p>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="flex-1 flex flex-col relative bg-[radial-gradient(circle_at_top_right,rgba(6,182,212,0.05),transparent)]">
        <header class="h-16 flex items-center px-8 border-b border-white/5 justify-between backdrop-blur-md z-10">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 text-xs font-bold text-slate-400">
                    <i data-lucide="shield-check" size="14" class="text-cyan-500"></i>
                    تشفير عسكري للبيانات
                </div>
            </div>
            <div class="flex gap-2">
                <div class="px-3 py-1 bg-white/5 rounded-full text-[10px] font-bold border border-white/10 uppercase tracking-tighter">API Connected</div>
            </div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6 scrollbar-hide">
            <!-- Messages appear here -->
        </div>

        <!-- Input Section -->
        <div class="p-6 bg-gradient-to-t from-[#020617] via-[#020617]/90 to-transparent">
            <div class="max-w-4xl mx-auto relative group">
                <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500/20 to-blue-500/20 rounded-3xl blur opacity-25 group-focus-within:opacity-100 transition duration-500"></div>
                <div class="relative flex items-end gap-2 bg-slate-900 border border-white/10 p-3 rounded-2xl">
                    <textarea id="user-input" rows="1" placeholder="اسأل HOota Ai عن أي شيء..." class="flex-1 bg-transparent p-3 outline-none resize-none text-sm max-h-40 scrollbar-hide text-white"></textarea>
                    <button id="send-btn" onclick="handleSend()" class="p-4 bg-cyan-500 text-black rounded-xl hover:bg-cyan-400 transition-all active:scale-90 shadow-lg shadow-cyan-500/20 disabled:opacity-50">
                        <i data-lucide="send" size="18"></i>
                    </button>
                </div>
            </div>
            <p class="text-center text-[9px] text-slate-600 mt-4 uppercase tracking-[0.3em] font-bold">Integrated with HOota Neural Core v3.0</p>
        </div>
    </main>

    <script type="module">
        // ملاحظة للمستخدم: البيئة توفر الـ API KEY تلقائياً عند التشغيل
        const apiKey = ""; 

        lucide.createIcons();
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let chatHistory = [];

        window.onload = () => {
            appendMessage("ai", "أهلاً بك. أنا **HOota Ai**. لقد تم ربط نواة تفكيري بمحرك بحث عالمي وقاعدة معرفية ضخمة. كيف يمكنني مساعدتك في مهامك المعقدة اليوم؟");
        };

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = `flex gap-4 ${role === 'user' ? 'flex-row-reverse' : ''}`;
            
            // تحويل النص البسيط إلى HTML (دعم الـ Bold والأكواد)
            let formattedText = text
                .replace(/\*\*(.*?)\*\*/g, '<b class="text-cyan-400">$1</b>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

            div.innerHTML = `
                <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${role === 'ai' ? 'bg-cyan-500 text-black shadow-lg shadow-cyan-500/20' : 'bg-slate-800'}">
                    <i data-lucide="${role === 'ai' ? 'command' : 'user'}" size="18"></i>
                </div>
                <div class="${role === 'ai' ? 'ai-msg' : 'user-msg'} p-4 max-w-[85%] text-sm leading-relaxed shadow-sm whitespace-pre-wrap">
                    ${formattedText}
                </div>
            `;
            chatBox.appendChild(div);
            lucide.createIcons();
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showLoading() {
            const id = 'loading-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex gap-4 animate-pulse";
            div.innerHTML = `
                <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center flex-shrink-0">
                    <i data-lucide="zap" class="text-cyan-500" size="18"></i>
                </div>
                <div class="flex items-center gap-1.5 p-4 bg-white/5 rounded-2xl border border-white/10">
                    <div class="typing-dot"></div><div class="typing-dot" style="animation-delay:0.2s"></div><div class="typing-dot" style="animation-delay:0.4s"></div>
                </div>
            `;
            chatBox.appendChild(div);
            lucide.createIcons();
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        async function callAI(prompt) {
            const systemPrompt = "أنت HOota Ai، ذكاء اصطناعي متطور، محترف، وودود. قدم إجابات دقيقة وعميقة. إذا طُلب منك كود، اكتبه باحترافية. استعرض قدراتك في البحث والتحليل دائماً باسم هوتة آي.";
            
            let retries = 5;
            let delay = 1000;

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            tools: [{ "google_search": {} }]
                        })
                    });

                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    if (i === retries - 1) return "عذراً، واجهت الشبكة العصبية ضغطاً عالياً. يرجى المحاولة مرة أخرى.";
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2;
                }
            }
        }

        window.handleSend = async () => {
            const val = userInput.value.trim();
            if (!val || sendBtn.disabled) return;

            appendMessage("user", val);
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;

            const loadingId = showLoading();

            try {
                const aiResponse = await callAI(val);
                document.getElementById(loadingId).remove();
                appendMessage("ai", aiResponse);
            } catch (e) {
                document.getElementById(loadingId).remove();
                appendMessage("ai", "حدث خطأ غير متوقع أثناء معالجة البيانات.");
            } finally {
                sendBtn.disabled = false;
            }
        };

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        // ضبط الارتفاع التلقائي
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
