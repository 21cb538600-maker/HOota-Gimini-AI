<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOota AI | السرعة القصوى</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700&family=Noto+Sans+Arabic:wght@300;500;700;900&display=swap');
        
        :root {
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.4);
            --bg: #030305;
            --panel: rgba(15, 15, 20, 0.85);
        }

        body { 
            font-family: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ⚡️ أيقونة المعالجة السريعة */
        .loading-orbit {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loading-orbit::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            animation: spin 0.6s linear infinite; /* تسريع الدوران */
        }

        .loading-zap {
            animation: pulse-glow 1s ease-in-out infinite;
            filter: drop-shadow(0 0 10px var(--accent));
            color: var(--accent);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 0.8; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 40%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .msg-appear {
            animation: msgUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes msgUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-scroll::-webkit-scrollbar { width: 0px; }
        
        .nav-link { transition: all 0.3s ease; cursor: pointer; }
        .nav-link.active { color: var(--accent); transform: translateY(-2px); }

        .input-wrapper:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        @media (min-width: 1024px) {
            .container-fixed { max-width: 850px; margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ملاحظة: يتم جلب الـ API Key من البيئة المحيطة تلقائياً
        const apiKey = ""; 

        const App = () => {
            const [query, setQuery] = useState('');
            const [messages, setMessages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('home');
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) window.lucide.createIcons();
            }, [messages, isLoading, activeTab]);

            const requestAI = async (prompt) => {
                // استخدام نموذج Flash المطور للسرعة القصوى
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "أنت HOota AI. مطورك هو محمود عبدالله. إجاباتك فورية، مختصرة، وذكية جداً." }] },
                            generationConfig: {
                                temperature: 0.7,
                                maxOutputTokens: 1000,
                            }
                        })
                    });

                    if (!response.ok) throw new Error("Speed limit or Key issue");
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (err) {
                    return "عذراً، حدث تأخير غير متوقع. جرب مرة أخرى يا محمود.";
                }
            };

            const handleSendMessage = async (text = null) => {
                const content = text || query;
                if (!content.trim() || isLoading) return;

                setQuery('');
                setMessages(prev => [...prev, { role: 'user', text: content }]);
                setIsLoading(true);
                if (activeTab !== 'chat') setActiveTab('chat');

                const response = await requestAI(content);
                setMessages(prev => [...prev, { role: 'ai', text: response }]);
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden bg-[#030305]">
                    
                    {/* Header */}
                    <header className="fixed top-0 left-0 right-0 z-[100] px-6 py-4 flex justify-between items-center glass-panel border-b-0 rounded-b-[1.5rem] mx-2 mt-2">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center shadow-lg">
                                <i data-lucide="zap" className="text-white w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-black tracking-tighter text-gradient leading-none">HOota AI</h1>
                                <p className="text-[8px] font-bold text-slate-500 tracking-[0.2em] uppercase mt-1">Turbo Engine</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <div className="w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></div>
                            <span className="text-[9px] text-slate-400 font-bold uppercase">Ready</span>
                        </div>
                    </header>

                    {/* Main Container */}
                    <main className="flex-1 overflow-y-auto custom-scroll pt-28 pb-44 px-4">
                        <div className="container-fixed">
                            {activeTab === 'home' && (
                                <div className="py-10 space-y-10 animate-fadeIn">
                                    <div className="text-center space-y-2">
                                        <h2 className="text-4xl md:text-7xl font-black text-white tracking-tighter leading-tight">
                                            السرعة <span className="text-gradient">القصوى</span>
                                        </h2>
                                        <p className="text-slate-400 text-sm md:text-lg font-light">مرحبًا بك يا محمود في النسخة المطورة والأسرع.</p>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {[
                                            { t: "بحث سريع", i: "search", d: "ما هي أسرع لغات البرمجة حالياً؟" },
                                            { t: "تحليل ذكي", i: "brain-circuit", d: "لخص لي أهم فوائد الذكاء الاصطناعي" }
                                        ].map((card, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => handleSendMessage(card.d)}
                                                className="glass-panel p-6 rounded-[2rem] flex items-center gap-5 group hover:border-purple-500/50 transition-all text-right"
                                            >
                                                <div className="w-12 h-12 rounded-xl bg-purple-600/10 flex items-center justify-center group-hover:bg-purple-600 transition-all">
                                                    <i data-lucide={card.i} className="text-purple-500 group-hover:text-white w-5 h-5"></i>
                                                </div>
                                                <div className="flex-1">
                                                    <h3 className="text-base font-bold text-white">{card.t}</h3>
                                                    <p className="text-[10px] text-slate-500 truncate">{card.d}</p>
                                                </div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'chat' && (
                                <div className="space-y-6 max-w-2xl mx-auto">
                                    {messages.map((m, i) => (
                                        <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} msg-appear`}>
                                            <div className={`max-w-[85%] p-5 rounded-[1.8rem] text-[14px] leading-relaxed ${
                                                m.role === 'user' 
                                                ? 'bg-purple-600 text-white rounded-br-none' 
                                                : 'glass-panel border-white/5 rounded-bl-none text-slate-200'
                                            }`}>
                                                <div className="whitespace-pre-wrap">{m.text}</div>
                                            </div>
                                        </div>
                                    ))}
                                    {isLoading && (
                                        <div className="flex justify-center py-6 msg-appear">
                                            <div className="loading-orbit">
                                                <i data-lucide="zap" className="w-5 h-5 loading-zap"></i>
                                            </div>
                                        </div>
                                    )}
                                    <div ref={chatEndRef} />
                                </div>
                            )}

                            {activeTab === 'about' && (
                                <div className="py-12 animate-fadeIn text-center space-y-6">
                                    <div className="w-20 h-20 rounded-[1.5rem] bg-gradient-to-tr from-purple-600 to-blue-500 mx-auto flex items-center justify-center shadow-xl">
                                        <i data-lucide="shield-check" className="w-10 h-10 text-white"></i>
                                    </div>
                                    <h2 className="text-2xl font-black text-white">محمود عبدالله</h2>
                                    <p className="text-slate-500 text-sm max-w-xs mx-auto">مطور الأنظمة الذكية وفائقة السرعة.</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Bottom Nav */}
                    <footer className="fixed bottom-0 left-0 right-0 z-[100] px-4 pb-8 pt-4 bg-gradient-to-t from-black via-black/90 to-transparent">
                        <div className="container-fixed flex flex-col gap-4">
                            
                            {activeTab === 'chat' && (
                                <div className="glass-panel p-1.5 rounded-full flex items-center gap-2 border-white/10 input-wrapper">
                                    <input 
                                        className="flex-1 bg-transparent border-none outline-none px-5 py-3 text-sm text-white placeholder:text-slate-600"
                                        placeholder="اسأل HOota بسرعة..."
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                    />
                                    <button 
                                        onClick={() => handleSendMessage()}
                                        disabled={isLoading || !query.trim()}
                                        className="w-12 h-12 rounded-full bg-purple-600 flex items-center justify-center hover:scale-105 transition-all disabled:opacity-20 shadow-lg"
                                    >
                                        <i data-lucide="send" className="w-5 h-5 text-white"></i>
                                    </button>
                                </div>
                            )}

                            <nav className="glass-panel py-3 px-10 rounded-full flex justify-between items-center mx-auto w-full max-w-[400px]">
                                <button onClick={() => setActiveTab('home')} className={`nav-link flex flex-col items-center gap-0.5 ${activeTab === 'home' ? 'active' : 'text-slate-500'}`}>
                                    <i data-lucide="home" className="w-5 h-5"></i>
                                    <span className="text-[8px] font-bold uppercase tracking-widest">البداية</span>
                                </button>
                                <button onClick={() => setActiveTab('chat')} className={`nav-link flex flex-col items-center gap-0.5 ${activeTab === 'chat' ? 'active' : 'text-slate-500'}`}>
                                    <i data-lucide="message-square" className="w-5 h-5"></i>
                                    <span className="text-[8px] font-bold uppercase tracking-widest">الدردشة</span>
                                </button>
                                <button onClick={() => setActiveTab('about')} className={`nav-link flex flex-col items-center gap-0.5 ${activeTab === 'about' ? 'active' : 'text-slate-500'}`}>
                                    <i data-lucide="fingerprint" className="w-5 h-5"></i>
                                    <span className="text-[8px] font-bold uppercase tracking-widest">المطور</span>
                                </button>
                            </nav>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
