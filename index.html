<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOota AI | محمود عبدالله</title>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Noto+Sans+Arabic:wght@400;700;900&display=swap');
        
        :root {
            --accent: #8b5cf6;
            --accent-dark: #6d28d9;
        }

        body { 
            font-family: 'Noto Sans Arabic', 'Plus Jakarta Sans', sans-serif; 
            background-color: #030305;
            color: #e2e8f0;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .gradient-text {
            background: linear-gradient(135deg, #a78bfa 0%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-active {
            color: var(--accent);
            position: relative;
        }
        
        .nav-active::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');

            useEffect(() => {
                lucide.createIcons();
            }, [activeTab]);

            return (
                <div className="min-h-screen relative flex flex-col">
                    {/* Background Elements */}
                    <div className="fixed inset-0 pointer-events-none z-0">
                        <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-purple-900/20 blur-[120px] rounded-full"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-900/20 blur-[120px] rounded-full"></div>
                    </div>

                    {/* Header */}
                    <header className="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-9 h-9 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-lg flex items-center justify-center shadow-lg shadow-purple-500/20">
                                    <i data-lucide="zap" className="text-white w-5 h-5"></i>
                                </div>
                                <h1 className="text-xl font-black tracking-wider gradient-text uppercase">HOota AI</h1>
                            </div>
                            <div className="text-xs text-slate-400 bg-white/5 px-3 py-1 rounded-full border border-white/10">
                                v1.0 Beta
                            </div>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 max-w-4xl mx-auto w-full p-6 pb-32 z-10">
                        {activeTab === 'dashboard' && (
                            <section className="animate-fade space-y-8">
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-bold">لوحة التحكم</h2>
                                    <p className="text-slate-400">أهلاً بك في نظام HOota الذكي</p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="glass p-6 rounded-3xl space-y-4 border-l-4 border-l-purple-500">
                                        <div className="flex items-center gap-3 text-purple-400">
                                            <i data-lucide="sparkles"></i>
                                            <span className="font-bold text-sm">حالة النظام</span>
                                        </div>
                                        <p className="text-2xl font-bold">الذكاء نشط</p>
                                        <div className="w-full bg-white/5 h-2 rounded-full overflow-hidden">
                                            <div className="bg-purple-500 h-full w-[85%]"></div>
                                        </div>
                                    </div>
                                    
                                    <div className="glass p-6 rounded-3xl space-y-4 border-l-4 border-l-indigo-500">
                                        <div className="flex items-center gap-3 text-indigo-400">
                                            <i data-lucide="clock"></i>
                                            <span className="font-bold text-sm">الوقت الحالي</span>
                                        </div>
                                        <p className="text-2xl font-bold">{new Date().toLocaleTimeString('ar-EG')}</p>
                                        <p className="text-xs text-slate-500">تم المزامنة بنجاح</p>
                                    </div>
                                </div>
                            </section>
                        )}

                        {activeTab === 'about' && (
                            <section className="animate-fade space-y-6 text-center py-8">
                                <div className="relative inline-block">
                                    <div className="w-32 h-32 mx-auto rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 p-1">
                                        <div className="w-full h-full rounded-full bg-[#030305] flex items-center justify-center overflow-hidden">
                                            <i data-lucide="user" className="w-16 h-16 text-slate-700"></i>
                                        </div>
                                    </div>
                                    <div className="absolute bottom-0 right-0 bg-green-500 w-6 h-6 rounded-full border-4 border-[#030305]"></div>
                                </div>
                                
                                <div className="space-y-2">
                                    <h2 className="text-3xl font-black">محمود عبدالله</h2>
                                    <p className="text-purple-400 font-medium">مؤسس ومطور HOota AI</p>
                                </div>

                                <div className="glass p-8 rounded-[2rem] text-right space-y-4 max-w-lg mx-auto">
                                    <h3 className="text-xl font-bold flex items-center gap-2">
                                        <i data-lucide="info" className="text-purple-500"></i>
                                        نبذة عن المطور
                                    </h3>
                                    <p className="text-slate-300 leading-relaxed">
                                        أنا محمود عبدالله، شغوف بالتقنية والذكاء الاصطناعي. قمت بتطوير <strong>HOota AI</strong> ليكون منصة متكاملة تجمع بين سهولة الاستخدام وقوة الأدوات الذكية، بهدف تسهيل المهام اليومية وتقديم تجربة مستخدم فريدة.
                                    </p>
                                    <div className="flex flex-wrap gap-2 pt-4">
                                        <span className="px-3 py-1 bg-white/5 rounded-lg text-xs border border-white/10">مطور ويب</span>
                                        <span className="px-3 py-1 bg-white/5 rounded-lg text-xs border border-white/10">مهتم بالذكاء الاصطناعي</span>
                                        <span className="px-3 py-1 bg-white/5 rounded-lg text-xs border border-white/10">رائد أعمال</span>
                                    </div>
                                </div>

                                <div className="flex justify-center gap-4 pt-6">
                                    <button className="p-3 glass rounded-2xl hover:text-purple-400 transition-colors">
                                        <i data-lucide="github"></i>
                                    </button>
                                    <button className="p-3 glass rounded-2xl hover:text-blue-400 transition-colors">
                                        <i data-lucide="linkedin"></i>
                                    </button>
                                    <button className="p-3 glass rounded-2xl hover:text-pink-400 transition-colors">
                                        <i data-lucide="instagram"></i>
                                    </button>
                                </div>
                            </section>
                        )}

                        {activeTab === 'ai' && (
                            <section className="animate-fade h-[60vh] flex flex-col glass rounded-[2.5rem] overflow-hidden">
                                <div className="p-4 bg-white/5 border-b border-white/5 flex items-center justify-between">
                                    <span className="text-sm font-bold">مساعد HOota الذكي</span>
                                    <div className="flex gap-1">
                                        <div className="w-2 h-2 rounded-full bg-red-500/50"></div>
                                        <div className="w-2 h-2 rounded-full bg-yellow-500/50"></div>
                                        <div className="w-2 h-2 rounded-full bg-green-500/50"></div>
                                    </div>
                                </div>
                                <div className="flex-1 p-6 flex items-center justify-center text-slate-500 flex-col gap-4">
                                    <i data-lucide="message-square-dashed" className="w-12 h-12 opacity-20"></i>
                                    <p>نظام الدردشة قيد التجهيز من قبل محمود</p>
                                </div>
                            </section>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
                        <div className="glass px-8 py-4 rounded-[32px] flex items-center gap-12 border border-white/10">
                            <button 
                                onClick={() => setActiveTab('dashboard')} 
                                className={`transition-all duration-300 ${activeTab === 'dashboard' ? 'nav-active scale-110' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                <i data-lucide="layout-grid"></i>
                            </button>
                            <button 
                                onClick={() => setActiveTab('ai')} 
                                className={`transition-all duration-300 ${activeTab === 'ai' ? 'nav-active scale-110' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                <i data-lucide="bot"></i>
                            </button>
                            <button 
                                onClick={() => setActiveTab('about')} 
                                className={`transition-all duration-300 ${activeTab === 'about' ? 'nav-active scale-110' : 'text-slate-500 hover:text-slate-300'}`}
                            >
                                <i data-lucide="user-circle"></i>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
