<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getAuth, signInAnonymously, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { 
  getFirestore, collection, addDoc, onSnapshot, serverTimestamp 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const e = React.createElement;

function App() {
  const [user, setUser] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [text, setText] = React.useState("");

  React.useEffect(() => {
    signInAnonymously(auth);

    onAuthStateChanged(auth, (u) => {
      setUser(u);
    });
  }, []);

  React.useEffect(() => {
    if (!user) return;

    const ref = collection(db, "chats");

    onSnapshot(ref, (snap) => {
      const data = snap.docs.map(d => d.data());
      setMessages(data);
    });
  }, [user]);

  const send = async () => {
    if (!text) return;

    await addDoc(collection(db, "chats"), {
      text,
      timestamp: serverTimestamp()
    });

    setText("");
  };

  if (!user) return e("div", {className:"p-10 text-center"}, "جاري التحميل...");

  return e("div", {className:"h-screen flex flex-col bg-black text-white"},
    e("div", {className:"flex-1 overflow-y-auto p-4"},
      messages.map((m, i) =>
        e("div", {key:i, className:"mb-2 bg-gray-800 p-3 rounded"}, m.text)
      )
    ),

    e("div", {className:"p-4 flex gap-2"},
      e("input", {
        value:text,
        onChange:(e)=>setText(e.target.value),
        className:"flex-1 p-2 bg-gray-900 rounded"
      }),
      e("button", {
        onClick:send,
        className:"bg-cyan-600 px-4 rounded"
      }, "إرسال")
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</head>

<body class="bg-black">
<div id="root"></div>
</body>
</html>
