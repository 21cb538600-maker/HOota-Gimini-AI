<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOota AI | محمود عبدالله</title>
    
    <!-- React & Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Sans+Arabic:wght@300;500;700;900&display=swap');
        
        :root {
            --primary: #8b5cf6;
            --secondary: #6366f1;
            --bg-dark: #050508;
        }

        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: var(--bg-dark);
            color: #f8fafc;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(15, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .chat-bubble-user {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 1.25rem 1.25rem 0 1.25rem;
        }

        .chat-bubble-ai {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.25rem 1.25rem 1.25rem 0;
        }

        .nav-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-active {
            color: var(--primary);
            transform: translateY(-4px);
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide scrollbar but keep functionality */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [messages, setMessages] = useState([
                { id: 1, role: 'ai', text: 'أهلاً بك! أنا HOota AI، كيف يمكنني مساعدتك اليوم؟' }
            ]);
            const [inputValue, setInputValue] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const chatEndRef = useRef(null);

            const scrollToBottom = () => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            };

            useEffect(() => {
                scrollToBottom();
                lucide.createIcons();
            }, [messages, activeTab]);

            const handleSend = () => {
                if (!inputValue.trim()) return;
                
                const newUserMsg = { id: Date.now(), role: 'user', text: inputValue };
                setMessages(prev => [...prev, newUserMsg]);
                setInputValue('');
                setIsTyping(true);

                // Simulation of AI Response
                setTimeout(() => {
                    const aiResponse = { 
                        id: Date.now() + 1, 
                        role: 'ai', 
                        text: `أنا نسخة تجريبية حالياً، محمود عبدالله يعمل على ربطي بمحركات البحث الذكية قريباً! هل لديك أي استفسار آخر؟` 
                    };
                    setMessages(prev => [...prev, aiResponse]);
                    setIsTyping(false);
                }, 1500);
            };

            return (
                <div className="flex flex-col h-screen max-h-screen overflow-hidden">
                    {/* Header */}
                    <header className="px-6 py-4 flex justify-between items-center glass-panel z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center">
                                <i data-lucide="cpu" className="w-5 h-5 text-white"></i>
                            </div>
                            <span className="font-black text-lg tracking-tight gradient-text">HOota AI</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <span className="text-[10px] uppercase tracking-widest text-slate-500 font-bold border border-white/10 px-2 py-0.5 rounded">Stable v1.2</span>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto no-scrollbar relative">
                        {/* Background Decor */}
                        <div className="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
                            <div className="absolute top-1/4 -right-20 w-80 h-80 bg-purple-600/10 blur-[100px] rounded-full"></div>
                            <div className="absolute bottom-1/4 -left-20 w-80 h-80 bg-blue-600/10 blur-[100px] rounded-full"></div>
                        </div>

                        <div className="max-w-3xl mx-auto px-4 py-6 h-full">
                            {activeTab === 'dashboard' && (
                                <div className="space-y-6 animate-slide-up">
                                    <div className="glass-panel p-8 rounded-[2.5rem] text-center border-purple-500/20">
                                        <h1 className="text-4xl font-black mb-2 italic">مرحباً بك!</h1>
                                        <p className="text-slate-400">نظام التشغيل الذكي الخاص بك جاهز</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="glass-panel p-5 rounded-3xl space-y-3">
                                            <i data-lucide="zap" className="text-yellow-400 w-5 h-5"></i>
                                            <p className="text-sm font-bold text-slate-300">السرعة</p>
                                            <p className="text-xs text-slate-500">استجابة فائقة</p>
                                        </div>
                                        <div className="glass-panel p-5 rounded-3xl space-y-3">
                                            <i data-lucide="shield-check" className="text-green-400 w-5 h-5"></i>
                                            <p className="text-sm font-bold text-slate-300">الأمان</p>
                                            <p className="text-xs text-slate-500">خصوصية تامة</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'ai' && (
                                <div className="flex flex-col h-full animate-slide-up">
                                    <div className="flex-1 space-y-4 mb-20 overflow-y-auto no-scrollbar">
                                        {messages.map((m) => (
                                            <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-start' : 'justify-end'}`}>
                                                <div className={`max-w-[85%] p-4 shadow-xl ${m.role === 'user' ? 'chat-bubble-user text-white' : 'chat-bubble-ai text-slate-200'}`}>
                                                    <p className="text-sm leading-relaxed">{m.text}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="flex justify-end">
                                                <div className="chat-bubble-ai p-4 flex gap-1">
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce"></span>
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={chatEndRef} />
                                    </div>
                                    
                                    {/* Chat Input Fixed above nav */}
                                    <div className="fixed bottom-24 left-4 right-4 max-w-3xl mx-auto">
                                        <div className="glass-panel p-2 rounded-2xl flex gap-2 items-center shadow-2xl border-white/20">
                                            <input 
                                                type="text" 
                                                value={inputValue}
                                                onChange={(e) => setInputValue(e.target.value)}
                                                onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                                placeholder="اكتب رسالتك هنا..."
                                                className="flex-1 bg-transparent border-none outline-none px-4 py-2 text-sm"
                                            />
                                            <button 
                                                onClick={handleSend}
                                                className="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center hover:bg-purple-500 transition-colors"
                                            >
                                                <i data-lucide="send-horizontal" className="w-5 h-5 text-white"></i>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'about' && (
                                <div className="animate-slide-up space-y-6">
                                    <div className="glass-panel p-8 rounded-[2.5rem] border-t-4 border-purple-600 relative overflow-hidden">
                                        <div className="absolute top-0 right-0 p-4 opacity-10">
                                            <i data-lucide="quote" className="w-20 h-20"></i>
                                        </div>
                                        <div className="flex flex-col items-center gap-4 text-center">
                                            <div className="w-24 h-24 rounded-3xl bg-gradient-to-br from-purple-500 to-indigo-600 p-1">
                                                <div className="w-full h-full rounded-[1.4rem] bg-[#050508] flex items-center justify-center">
                                                    <i data-lucide="user" className="w-10 h-10 text-slate-600"></i>
                                                </div>
                                            </div>
                                            <div>
                                                <h2 className="text-2xl font-bold">محمود عبدالله</h2>
                                                <p className="text-purple-400 text-sm font-medium">مؤسس ومطور HOota AI</p>
                                            </div>
                                            <p className="text-slate-400 text-sm leading-relaxed max-w-sm">
                                                أنا محمود عبدالله، قمت ببناء HOota AI ليكون بوابتكم نحو مستقبل أكثر ذكاءً. هدفي هو دمج أحدث تقنيات الذكاء الاصطناعي في أدوات يومية بسيطة وسهلة المنال للجميع.
                                            </p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex gap-3 justify-center">
                                        <div className="p-4 glass-panel rounded-2xl flex-1 text-center group hover:border-purple-500/50 transition-all cursor-pointer">
                                            <i data-lucide="mail" className="w-5 h-5 mx-auto mb-2 text-slate-400 group-hover:text-purple-400"></i>
                                            <span className="text-[10px] block text-slate-500">تواصل معي</span>
                                        </div>
                                        <div className="p-4 glass-panel rounded-2xl flex-1 text-center group hover:border-purple-500/50 transition-all cursor-pointer">
                                            <i data-lucide="share-2" className="w-5 h-5 mx-auto mb-2 text-slate-400 group-hover:text-purple-400"></i>
                                            <span className="text-[10px] block text-slate-500">مشاركة</span>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="glass-panel border-t border-white/5 px-6 py-4 pb-8 md:pb-6 z-50">
                        <div className="max-w-md mx-auto flex justify-around items-center">
                            <button 
                                onClick={() => setActiveTab('dashboard')}
                                className={`nav-item flex flex-col items-center gap-1 ${activeTab === 'dashboard' ? 'nav-active' : 'text-slate-500'}`}
                            >
                                <i data-lucide="home" className="w-6 h-6"></i>
                                <span className="text-[10px] font-bold">الرئيسية</span>
                            </button>
                            
                            <button 
                                onClick={() => setActiveTab('ai')}
                                className={`nav-item flex flex-col items-center gap-1 ${activeTab === 'ai' ? 'nav-active' : 'text-slate-500'}`}
                            >
                                <div className={`p-3 rounded-2xl -mt-8 shadow-2xl transition-all ${activeTab === 'ai' ? 'bg-purple-600 text-white scale-110 shadow-purple-500/40' : 'bg-slate-800 text-slate-400'}`}>
                                    <i data-lucide="message-circle" className="w-6 h-6"></i>
                                </div>
                                <span className="text-[10px] font-bold">الذكاء</span>
                            </button>
                            
                            <button 
                                onClick={() => setActiveTab('about')}
                                className={`nav-item flex flex-col items-center gap-1 ${activeTab === 'about' ? 'nav-active' : 'text-slate-500'}`}
                            >
                                <i data-lucide="fingerprint" className="w-6 h-6"></i>
                                <span className="text-[10px] font-bold">المطور</span>
                            </button>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
