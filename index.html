<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>HOota AI Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body {
  margin: 0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
}
</style>
</head>

<body>
<div id="root"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth,
  signInAnonymously,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBsvF9J_DneR5H0JbOW4HX_JjVWaajAUgk",
  authDomain: "website-8833c.firebaseapp.com",
  projectId: "website-8833c",
};

const GEMINI_API_KEY = "AIzaSyCaiLwj4_AG7KUXJEr1qb0Z_aSNVTlQlmU";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const e = React.createElement;

function App() {
  const [user, setUser] = React.useState(null);
  const [messages, setMessages] = React.useState([]);
  const [text, setText] = React.useState("");
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    signInAnonymously(auth);

    const unsub = onAuthStateChanged(auth, (u) => {
      setUser(u);
      setLoading(false);
    });

    return () => unsub();
  }, []);

  React.useEffect(() => {
    if (!user) return;

    const q = query(
      collection(db, "chats"),
      orderBy("timestamp", "asc")
    );

    const unsub = onSnapshot(q, (snap) => {
      setMessages(snap.docs.map(d => d.data()));
    });

    return () => unsub();
  }, [user]);

  async function askGemini(prompt) {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
          contents: [{
            parts: [{ text: prompt }]
          }]
        })
      }
    );

    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Error AI";
  }

  const send = async () => {
    if (!text.trim()) return;

    const userMsg = text;
    setText("");

    await addDoc(collection(db,"chats"),{
      text:userMsg,
      role:"user",
      timestamp:serverTimestamp()
    });

    const ai = await askGemini(userMsg);

    await addDoc(collection(db,"chats"),{
      text:ai,
      role:"ai",
      timestamp:serverTimestamp()
    });
  };

  if (loading) {
    return e("div",{className:"h-screen flex items-center justify-center text-white"},
      "جاري تشغيل HOota AI..."
    );
  }

  return e("div",{className:"h-screen flex flex-col text-white"},

    // HEADER
    e("div",{className:"glass p-4 text-center font-bold text-cyan-400"},
      "HOota AI • Premium Assistant"
    ),

    // CHAT
    e("div",{className:"flex-1 overflow-y-auto p-4 space-y-3"},
      messages.map((m,i)=>
        e("div",{
          key:i,
          className:
            "p-3 rounded-xl max-w-[80%] " +
            (m.role==="ai"
              ? "bg-white/5 border border-white/10"
              : "bg-cyan-600 ml-auto")
        },m.text)
      )
    ),

    // INPUT
    e("div",{className:"p-3 glass flex gap-2"},
      e("input",{
        value:text,
        onChange:(e)=>setText(e.target.value),
        placeholder:"اكتب رسالتك...",
        className:"flex-1 p-3 bg-black/40 rounded-xl outline-none"
      }),
      e("button",{
        onClick:send,
        className:"bg-cyan-500 px-5 rounded-xl font-bold"
      },"إرسال")
    )
  );
}

ReactDOM.render(e(App), document.getElementById("root"));
</script>

</body>
</html>
