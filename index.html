<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOota AI | السرعة القصوى</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Noto+Sans+Arabic:wght@300;500;700;900&display=swap');
        
        :root {
            --primary: #8b5cf6;
            --bg-dark: #050507;
            --card-dark: rgba(18, 18, 22, 0.7);
        }

        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: var(--card-dark);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ⚡️ Optimized Centered Spin */
        .zap-spinner {
            display: inline-block;
            animation: zap-optimized 1s linear infinite;
            filter: drop-shadow(0 0 10px #8b5cf6);
            transform-origin: center center;
            line-height: 1;
            font-size: 1.5rem;
        }

        @keyframes zap-optimized {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message-fade {
            animation: messageUp 0.4s ease-out forwards;
        }

        @keyframes messageUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .gradient-border {
            position: relative;
            border-radius: 9999px;
            padding: 1px;
            background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [messages, setMessages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('home');
            const chatEndRef = useRef(null);
            
            const apiKey = ""; 

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                lucide.createIcons();
            }, [messages, isLoading, activeTab]);

            const callAI = async (text) => {
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                let retries = 3;
                while (retries > 0) {
                    try {
                        const response = await fetch(endpoint, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text }] }],
                                tools: [{ "google_search": {} }],
                                systemInstruction: { parts: [{ text: "أنت HOota AI. مطورك هو محمود عبدالله. استجاباتك سريعة جداً ومركزة." }] }
                            })
                        });
                        
                        if (!response.ok) throw new Error("API Limit");
                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "لم أتمكن من الحصول على إجابة.";
                    } catch (e) {
                        retries--;
                        if (retries === 0) return "عذراً، المحرك تحت ضغط حالياً. حاول ثانية.";
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            };

            const onSend = async (forcedText = null) => {
                const targetText = forcedText || query;
                if (!targetText.trim() || isLoading) return;

                setQuery('');
                setMessages(prev => [...prev, { role: 'user', text: targetText }]);
                setIsLoading(true);
                if (activeTab !== 'chat') setActiveTab('chat');

                const responseText = await callAI(targetText);
                setMessages(prev => [...prev, { role: 'ai', text: responseText }]);
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen max-h-screen bg-[#050507] text-slate-100">
                    {/* Header */}
                    <header className="px-6 py-4 glass border-b border-white/5 flex justify-between items-center z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-[0_0_15px_rgba(139,92,246,0.3)]">
                                <i data-lucide="zap" className="text-white w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">HOota AI</h1>
                                <p className="text-[10px] text-slate-500 font-bold tracking-widest">MAHMOUD ABDULLAH</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                            <span className="text-[10px] text-slate-400 font-mono">ULTRA-FAST</span>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 overflow-y-auto chat-scroll p-4 md:p-8 pb-40">
                        {activeTab === 'home' && (
                            <div className="max-w-4xl mx-auto space-y-10 py-12 text-center">
                                <h2 className="text-4xl md:text-6xl font-black leading-tight tracking-tight">
                                    مرحباً <span className="text-purple-500">محمود</span>،<br/> كيف نسرع يومك؟
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {[
                                        { t: "أخبار اليوم", i: "newspaper", c: "ما هي أهم الأخبار العالمية في هذه اللحظة؟" },
                                        { t: "مساعد الكود", i: "code", c: "اكتب لي دالة JavaScript لحساب الفرق بين تاريخين" },
                                        { t: "ملخص سريع", i: "align-left", c: "لخص لي أهم فوائد الذكاء الاصطناعي في 2024" },
                                        { t: "دردشة حرة", i: "message-square", c: "مرحباً، أريد التحدث معك" }
                                    ].map((item, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => onSend(item.c)}
                                            className="glass p-6 rounded-[2rem] flex items-center gap-4 hover:border-purple-500/50 transition-all text-right group"
                                        >
                                            <div className="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center group-hover:bg-purple-600 transition-colors">
                                                <i data-lucide={item.i} className="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-sm">{item.t}</h3>
                                                <p className="text-[10px] text-slate-500">اضغط للبدء فوراً</p>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'chat' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} message-fade`}>
                                        <div className={`max-w-[85%] p-4 rounded-[1.8rem] text-[14px] leading-relaxed ${
                                            m.role === 'user' ? 'bg-purple-600 text-white rounded-br-none' : 'glass border-white/10 rounded-bl-none shadow-xl'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start message-fade">
                                        <div className="glass p-4 rounded-[1.8rem] rounded-bl-none flex items-center gap-4">
                                            <span className="zap-spinner">⚡️</span>
                                            <span className="text-[11px] font-bold text-purple-400 tracking-widest uppercase">HOota يعمل الآن...</span>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>
                        )}

                        {activeTab === 'about' && (
                            <div className="max-w-xl mx-auto py-10 text-center animate-slideIn">
                                <div className="glass p-8 rounded-[3rem] border-purple-500/20">
                                    <div className="w-20 h-20 bg-purple-600 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl">
                                        <i data-lucide="shield-check" className="w-10 h-10 text-white"></i>
                                    </div>
                                    <h2 className="text-2xl font-black mb-2">محمود عبدالله</h2>
                                    <p className="text-purple-400 text-[10px] font-bold tracking-widest mb-6">CHIEF ARCHITECT</p>
                                    <p className="text-slate-400 text-sm leading-relaxed">
                                        هذا النظام هو نتاج رؤية تقنية تهدف لدمج السرعة بالذكاء. تم تحسين كل سطر برمجج لضمان تجربة مستخدم لا تشوبها شائبة.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Nav & Input */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-black via-black/90 to-transparent">
                        <div className="max-w-3xl mx-auto space-y-4">
                            {activeTab === 'chat' && (
                                <div className="gradient-border shadow-2xl">
                                    <div className="bg-[#0a0a0c] rounded-full p-1.5 flex items-center gap-2">
                                        <input 
                                            className="flex-1 bg-transparent border-none outline-none px-6 py-2 text-sm placeholder:text-slate-600"
                                            placeholder="اكتب رسالتك يا محمود..."
                                            value={query}
                                            onChange={(e) => setQuery(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && onSend()}
                                        />
                                        <button 
                                            onClick={() => onSend()}
                                            disabled={isLoading || !query.trim()}
                                            className="w-10 h-10 rounded-full bg-purple-600 flex items-center justify-center hover:scale-105 active:scale-95 transition-all disabled:opacity-30"
                                        >
                                            <i data-lucide="send" className="w-4 h-4 text-white"></i>
                                        </button>
                                    </div>
                                </div>
                            )}

                            <nav className="flex justify-center gap-12 items-center pt-2">
                                <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? 'text-purple-500 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="layout-grid" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">الرئيسية</span>
                                </button>
                                <button onClick={() => setActiveTab('chat')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'chat' ? 'text-purple-500 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="sparkles" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">الدردشة</span>
                                </button>
                                <button onClick={() => setActiveTab('about')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'about' ? 'text-purple-500 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="crown" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">المطور</span>
                                </button>
                            </nav>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
