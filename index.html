<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HOota AI | المحرك المستقر</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Noto+Sans+Arabic:wght@300;500;700;900&display=swap');
        
        :root {
            --primary: #8b5cf6;
            --bg-dark: #050507;
            --card-dark: rgba(18, 18, 22, 0.85);
        }

        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: var(--bg-dark);
            color: #f1f5f9;
            margin: 0;
            overflow: hidden;
        }

        .glass {
            background: var(--card-dark);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zap-spinner {
            display: inline-block;
            animation: zap-spin 0.8s linear infinite;
            filter: drop-shadow(0 0 12px #8b5cf6);
            transform-origin: center;
            font-size: 1.4rem;
        }

        @keyframes zap-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .chat-scroll::-webkit-scrollbar { width: 3px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: rgba(139, 92, 246, 0.3); border-radius: 10px; }

        .msg-anim {
            animation: fadeInUp 0.3s ease-out forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-glow:focus-within {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [query, setQuery] = useState('');
            const [messages, setMessages] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('home');
            const chatEndRef = useRef(null);
            
            const apiKey = ""; // سيتم تفعيله تلقائياً

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
                if (window.lucide) window.lucide.createIcons();
            }, [messages, isLoading, activeTab]);

            const callAI = async (text) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: "أنت HOota AI، مساعد ذكي سريع جداً من تطوير محمود عبدالله. إجاباتك موجزة ومفيدة." }] }
                        })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Error");
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "نعتذر، لم يتم العثور على رد.";
                } catch (e) {
                    console.error("AI Error:", e);
                    return "حدث خطأ في الاتصال. يرجى التأكد من مفتاح الـ API أو المحاولة لاحقاً.";
                }
            };

            const handleSend = async (forcedText = null) => {
                const finalQuery = forcedText || query;
                if (!finalQuery.trim() || isLoading) return;

                setQuery('');
                setMessages(prev => [...prev, { role: 'user', text: finalQuery }]);
                setIsLoading(true);
                if (activeTab !== 'chat') setActiveTab('chat');

                const aiResponse = await callAI(finalQuery);
                setMessages(prev => [...prev, { role: 'ai', text: aiResponse }]);
                setIsLoading(false);
            };

            return (
                <div className="flex flex-col h-screen max-h-screen">
                    {/* Header */}
                    <header className="px-6 py-4 glass border-b border-white/5 flex justify-between items-center z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-purple-600 rounded-xl flex items-center justify-center shadow-lg">
                                <i data-lucide="zap" className="text-white w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-black italic tracking-tighter">HOota AI</h1>
                                <p className="text-[10px] text-slate-500 font-bold uppercase">Mahmoud Abdullah</p>
                            </div>
                        </div>
                        <div className="text-[10px] font-mono text-green-500 flex items-center gap-1.5">
                            <span className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                            ACTIVE ENGINE
                        </div>
                    </header>

                    {/* Body */}
                    <main className="flex-1 overflow-y-auto chat-scroll p-4 md:p-8 pb-40">
                        {activeTab === 'home' && (
                            <div className="max-w-4xl mx-auto py-16 text-center space-y-12">
                                <h2 className="text-5xl md:text-7xl font-black tracking-tighter leading-tight">
                                    أهلاً <span className="text-purple-500">محمود</span>!<br/> كيف يمكنني مساعدتك؟
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {[
                                        { t: "أحدث التقنيات", i: "cpu", c: "ما هي أحدث تطورات الذكاء الاصطناعي اليوم؟" },
                                        { t: "تحليل كود", i: "code-2", c: "اشرح لي كود بايثون بسيط لتوقع الطقس" },
                                        { t: "أفكار مشاريع", i: "lightbulb", c: "أعطني فكرة مشروع برمجي مبتكر لعام 2024" },
                                        { t: "دردشة سريعة", i: "zap", c: "من هو محمود عبدالله مطور HOota AI؟" }
                                    ].map((item, idx) => (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSend(item.c)}
                                            className="glass p-6 rounded-[2.5rem] flex items-center gap-4 hover:border-purple-500/50 transition-all text-right group"
                                        >
                                            <div className="w-12 h-12 bg-purple-500/10 rounded-2xl flex items-center justify-center group-hover:bg-purple-600 transition-colors">
                                                <i data-lucide={item.i} className="w-5 h-5 text-purple-500 group-hover:text-white"></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-sm">{item.t}</h3>
                                                <p className="text-[10px] text-slate-500">اضغط للاستفسار فوراً</p>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {activeTab === 'chat' && (
                            <div className="max-w-4xl mx-auto space-y-6">
                                {messages.length === 0 && (
                                    <div className="text-center py-20 opacity-20">
                                        <i data-lucide="message-circle" className="w-16 h-16 mx-auto mb-4"></i>
                                        <p>ابدأ المحادثة الآن..</p>
                                    </div>
                                )}
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} msg-anim`}>
                                        <div className={`max-w-[85%] p-4 rounded-[1.8rem] text-[14px] leading-relaxed shadow-sm ${
                                            m.role === 'user' ? 'bg-purple-600 text-white rounded-br-none' : 'glass border-white/5 rounded-bl-none'
                                        }`}>
                                            {m.text}
                                        </div>
                                    </div>
                                ))}
                                {isLoading && (
                                    <div className="flex justify-start msg-anim">
                                        <div className="glass p-4 rounded-[1.8rem] rounded-bl-none flex items-center gap-4">
                                            <span className="zap-spinner">⚡️</span>
                                            <span className="text-[11px] font-bold text-purple-400 tracking-tighter uppercase">HOota يعمل الآن...</span>
                                        </div>
                                    </div>
                                )}
                                <div ref={chatEndRef} />
                            </div>
                        )}

                        {activeTab === 'about' && (
                            <div className="max-w-xl mx-auto py-12">
                                <div className="glass p-10 rounded-[3rem] text-center space-y-6 border-purple-500/20">
                                    <div className="w-20 h-20 bg-purple-600 rounded-3xl mx-auto flex items-center justify-center shadow-xl">
                                        <i data-lucide="crown" className="w-10 h-10 text-white"></i>
                                    </div>
                                    <h2 className="text-3xl font-black tracking-tight">محمود عبدالله</h2>
                                    <p className="text-slate-400 text-sm leading-relaxed">
                                        المطور الرئيسي لمحرك HOota AI. تم تصميم هذا النظام ليكون تجربة ذكاء اصطناعي فريدة تمزج بين السرعة العالية والتصميم العصري.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Fixed Navigation & Input */}
                    <div className="fixed bottom-0 left-0 right-0 p-6 z-50 bg-gradient-to-t from-black via-black/90 to-transparent">
                        <div className="max-w-3xl mx-auto flex flex-col gap-4">
                            {activeTab === 'chat' && (
                                <div className="glass p-1.5 rounded-full flex items-center gap-2 input-glow border-white/10 transition-all">
                                    <input 
                                        className="flex-1 bg-transparent border-none outline-none px-6 py-2.5 text-sm placeholder:text-slate-600"
                                        placeholder="اكتب رسالتك يا محمود..."
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSend()}
                                    />
                                    <button 
                                        onClick={() => handleSend()}
                                        disabled={isLoading || !query.trim()}
                                        className="w-11 h-11 rounded-full bg-purple-600 flex items-center justify-center hover:scale-105 active:scale-95 transition-all disabled:opacity-30 disabled:grayscale shadow-lg shadow-purple-500/20"
                                    >
                                        <i data-lucide="arrow-up" className="w-5 h-5 text-white"></i>
                                    </button>
                                </div>
                            )}

                            <nav className="flex justify-center gap-12 items-center py-2">
                                <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? 'text-purple-400 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="layout-grid" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">الرئيسية</span>
                                </button>
                                <button onClick={() => setActiveTab('chat')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'chat' ? 'text-purple-400 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="sparkles" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">المحادثة</span>
                                </button>
                                <button onClick={() => setActiveTab('about')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'about' ? 'text-purple-400 scale-110' : 'text-slate-500'}`}>
                                    <i data-lucide="user" className="w-6 h-6"></i>
                                    <span className="text-[9px] font-bold">المطور</span>
                                </button>
                            </nav>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
